<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c084fc">
<title>Pilates Control</title>
<style>
  :root {
    --primary: #a855f7;
    --primary-dark: #7e22ce;
    --primary-light: #f3e8ff;
    --accent: #ec4899;
    --bg: #faf5ff;
    --surface: #ffffff;
    --text: #1e1b2e;
    --text-muted: #6b7280;
    --border: #e9d5ff;
    --success: #10b981;
    --danger: #ef4444;
    --shadow: 0 4px 24px rgba(168,85,247,.10);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  nav {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: #fff; padding: 0 16px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(126,34,206,.25);
  }
  .nav-inner { max-width: 480px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 58px; }
  .nav-title { font-size: 1.15rem; font-weight: 700; }
  .nav-sub { font-size: .72rem; opacity: .8; }
  .page { display: none; max-width: 480px; margin: 0 auto; padding: 16px; padding-bottom: 90px; }
  .page.active { display: block; }
  .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; margin-bottom: 14px; border: 1px solid var(--border); }
  .card-title { font-size: 1rem; font-weight: 700; }
  label { font-size: .82rem; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 5px; }
  input, select { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: .95rem; background: var(--bg); color: var(--text); outline: none; margin-bottom: 12px; transition: border .2s; }
  input:focus, select:focus { border-color: var(--primary); background: #fff; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 18px; border-radius: 10px; font-size: .9rem; font-weight: 700; border: none; cursor: pointer; transition: all .2s; width: 100%; }
  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-ghost { background: var(--primary-light); color: var(--primary); }
  .btn-sm { padding: 7px 13px; font-size: .8rem; width: auto; border-radius: 8px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .aluna-item { background: var(--surface); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; border: 1.5px solid var(--border); cursor: pointer; transition: all .2s; }
  .aluna-item:hover { border-color: var(--primary); }
  .aluna-header { display: flex; align-items: center; justify-content: space-between; }
  .aluna-name { font-weight: 700; font-size: 1rem; }
  .aluna-plan { font-size: .75rem; background: var(--primary-light); color: var(--primary); padding: 3px 9px; border-radius: 20px; font-weight: 600; }
  .aluna-meta { display: flex; gap: 12px; margin-top: 7px; }
  .meta-item { font-size: .78rem; color: var(--text-muted); }
  .meta-item strong { color: var(--text); }
  .progress-bar { height: 5px; background: var(--border); border-radius: 10px; margin-top: 8px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--primary), var(--accent)); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .72rem; font-weight: 700; }
  .badge-ok { background: #d1fae5; color: #065f46; }
  .badge-warn { background: #fef3c7; color: #92400e; }
  .badge-danger { background: #fee2e2; color: #991b1b; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 24px 24px 0 0; padding: 24px 20px 32px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; animation: slideUp .3s ease; }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 20px; }
  .modal-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border-radius: 14px; padding: 16px; text-align: center; border: 1.5px solid var(--border); box-shadow: var(--shadow); }
  .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
  .stat-label { font-size: .75rem; color: var(--text-muted); font-weight: 600; margin-top: 3px; }
  .log-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .log-item:last-child { border: none; }
  .log-name { font-size: .9rem; font-weight: 600; }
  .log-date { font-size: .82rem; color: var(--text-muted); }
  .log-type { font-size: .75rem; color: var(--primary); font-weight: 600; }
  .pay-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: .9rem; }
  .pay-total { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
  .empty { text-align: center; padding: 36px 20px; color: var(--text-muted); font-size: .9rem; }
  .empty-icon { font-size: 2.5rem; margin-bottom: 8px; display: block; }
  .search-box { position: relative; margin-bottom: 14px; }
  .search-box input { padding-left: 38px; margin-bottom: 0; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
  .fab { position: fixed; bottom: 78px; right: 20px; width: 54px; height: 54px; background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; border: none; border-radius: 50%; font-size: 1.6rem; cursor: pointer; box-shadow: 0 4px 20px rgba(168,85,247,.45); z-index: 150; }
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; border-top: 1.5px solid var(--border); display: flex; box-shadow: 0 -2px 12px rgba(0,0,0,.07); z-index: 100; }
  .bn-btn { flex: 1; padding: 10px 4px 8px; border: none; background: none; cursor: pointer; font-size: .7rem; font-weight: 600; color: var(--text-muted); }
  .bn-btn span { display: block; font-size: 1.3rem; margin-bottom: 2px; }
  .bn-btn.active { color: var(--primary); }
  #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(30px); background: #1e1b2e; color: #fff; padding: 10px 22px; border-radius: 30px; font-size: .88rem; font-weight: 600; opacity: 0; transition: all .3s; z-index: 500; pointer-events: none; white-space: nowrap; }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div>
      <div class="nav-title">🧘 Pilates Control</div>
      <div class="nav-sub" id="currentMonth"></div>
    </div>
    <div id="navStudio" style="font-size:.82rem;opacity:.85;text-align:right"></div>
  </div>
</nav>

<!-- HOME -->
<div id="page-home" class="page active">
  <div class="stats-grid" id="statsGrid"></div>
  <div class="card">
    <div class="card-title" style="margin-bottom:14px">🎯 Registrar Aula</div>
    <label>Aluna</label>
    <select id="quickAluna"><option value="">Selecione...</option></select>
    <div class="form-row">
      <div><label>Data</label><input type="date" id="quickData"></div>
      <div>
        <label>Tipo</label>
        <select id="quickTipo">
          <option>Individual</option><option>Dupla</option><option>Trio</option><option>Grupo</option>
        </select>
      </div>
    </div>
    <label>Aparelhos / Exercícios</label>
    <input type="text" id="quickAparelhos" placeholder="Ex: Reformer, Cadillac, Chair...">
    <button class="btn btn-primary" onclick="registrarAula()">✅ Registrar Aula</button>
  </div>
  <div class="card">
    <div class="card-title" style="margin-bottom:12px">📋 Últimas Aulas</div>
    <div id="ultimasAulas"></div>
  </div>
</div>

<!-- ALUNAS -->
<div id="page-alunas" class="page">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Buscar aluna..." id="searchInput" oninput="renderAlunas()">
  </div>
  <div id="alunasList"></div>
</div>

<!-- PAGAMENTO -->
<div id="page-pagamento" class="page">
  <div class="card">
    <div class="card-title" style="margin-bottom:14px">💰 Cálculo de Pagamento</div>
    <div class="form-row">
      <div><label>De</label><input type="date" id="payDe" onchange="renderPagamento()"></div>
      <div><label>Até</label><input type="date" id="payAte" onchange="renderPagamento()"></div>
    </div>
    <div class="form-row">
      <div><label>Valor Individual (R$)</label><input type="number" id="vIndividual" value="80" onchange="renderPagamento()"></div>
      <div><label>Valor Dupla (R$)</label><input type="number" id="vDupla" value="50" onchange="renderPagamento()"></div>
    </div>
    <div class="form-row">
      <div><label>Valor Trio (R$)</label><input type="number" id="vTrio" value="40" onchange="renderPagamento()"></div>
      <div><label>Valor Grupo (R$)</label><input type="number" id="vGrupo" value="30" onchange="renderPagamento()"></div>
    </div>
  </div>
  <div id="payResult"></div>
</div>

<!-- CONFIG -->
<div id="page-config" class="page">
  <div class="card">
    <div class="card-title" style="margin-bottom:14px">👩 Sobre Mim</div>
    <label>Seu Nome</label><input type="text" id="cfgNome" placeholder="Nome da professora" oninput="salvarConfig()">
    <label>Studio</label><input type="text" id="cfgStudio" placeholder="Nome do studio" oninput="salvarConfig()">
  </div>
  <div class="card">
    <div class="card-title" style="margin-bottom:14px">💾 Backup de Dados</div>
    <button class="btn btn-ghost" onclick="exportar()" style="margin-bottom:10px">📤 Exportar Backup (JSON)</button>
    <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()" style="margin-bottom:10px">📥 Importar Backup</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importar(this)">
    <button class="btn btn-danger" onclick="limpar()">🗑️ Apagar Todos os Dados</button>
  </div>
  <div class="card" style="text-align:center;color:var(--text-muted);font-size:.8rem;line-height:1.8">
    <div style="font-size:1.5rem;margin-bottom:4px">🧘</div>
    <strong>Pilates Control v1.0</strong><br>
    Para instalar no celular:<br>
    <em>Menu do Chrome → "Adicionar à tela inicial"</em>
  </div>
</div>

<!-- RELATÓRIO -->
<div id="page-relatorio" class="page">
  <div class="card">
    <div class="card-title" style="margin-bottom:14px">📊 Relatório de Aulas</div>
    <div class="form-row">
      <div><label>De</label><input type="date" id="relDe" onchange="renderRelatorio()"></div>
      <div><label>Até</label><input type="date" id="relAte" onchange="renderRelatorio()"></div>
    </div>
    <label>Aluna (opcional)</label>
    <select id="relAluna" onchange="renderRelatorio()"><option value="">Todas</option></select>
    <button class="btn btn-primary" onclick="exportarPDF()" style="margin-top:4px">📄 Exportar PDF</button>
  </div>
  <div id="relResult"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="bn-btn active" id="bn-home" onclick="showPage('home')"><span>🏠</span>Início</button>
  <button class="bn-btn" id="bn-alunas" onclick="showPage('alunas')"><span>👩</span>Alunas</button>
  <button class="bn-btn" id="bn-relatorio" onclick="showPage('relatorio')"><span>📊</span>Relatório</button>
  <button class="bn-btn" id="bn-pagamento" onclick="showPage('pagamento')"><span>💰</span>Pagamento</button>
  <button class="bn-btn" id="bn-config" onclick="showPage('config')"><span>⚙️</span>Config</button>
</div>

<button class="fab" onclick="openModalAluna()" title="Nova Aluna">+</button>

<!-- MODAL NOVA/EDITAR ALUNA -->
<div class="modal-overlay" id="modalAluna">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalAlunaTitle">➕ Nova Aluna</div>
    <label>Nome *</label><input type="text" id="aNome" placeholder="Ex: Ana Paula">
    <label>Telefone</label><input type="tel" id="aTel" placeholder="(11) 99999-9999">
    <label>Frequência semanal</label>
    <select id="aPlano">
      <option value="1">1x por semana</option>
      <option value="2" selected>2x por semana</option>
      <option value="3">3x por semana</option>
      <option value="5">5x por semana</option>
    </select>
    <label>Tipo de Aula Padrão</label>
    <select id="aTipo"><option>Individual</option><option>Dupla</option><option>Trio</option><option>Grupo</option></select>
    <label>Observações / Foco</label>
    <input type="text" id="aObs" placeholder="Ex: lesão no joelho, foco em core...">
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" style="flex:1" onclick="closeModal('modalAluna')">Cancelar</button>
      <button class="btn btn-primary" style="flex:2" onclick="salvarAluna()">💾 Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL DETALHE ALUNA -->
<div class="modal-overlay" id="modalDetalhe">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="detalheContent"></div>
    <div class="modal-actions" style="margin-top:12px">
      <button class="btn btn-ghost btn-sm" style="flex:1" onclick="closeModal('modalDetalhe')">Fechar</button>
      <button class="btn btn-danger btn-sm" style="flex:1" id="btnExcluir">🗑️ Excluir Aluna</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let db = JSON.parse(localStorage.getItem('pilates_db') || 'null') || { alunas:[], aulas:[], config:{} };
  let editId = null;

  const save = () => localStorage.setItem('pilates_db', JSON.stringify(db));
  const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
  const fmt  = d => { if(!d)return''; const[y,m,day]=d.split('-'); return `${day}/${m}/${y}`; };
  const vals = () => ({
    Individual: +document.getElementById('vIndividual').value || 80,
    Dupla:      +document.getElementById('vDupla').value      || 50,
    Trio:       +document.getElementById('vTrio').value       || 40,
    Grupo:      +document.getElementById('vGrupo').value      || 30,
  });

  window.onload = () => {
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth();
    document.getElementById('payDe').value  = new Date(y,m,1).toISOString().slice(0,10);
    document.getElementById('payAte').value = new Date(y,m+1,0).toISOString().slice(0,10);
    document.getElementById('quickData').value = now.toISOString().slice(0,10);
    document.getElementById('currentMonth').textContent = now.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    if (db.config.nome)   document.getElementById('cfgNome').value   = db.config.nome;
    if (db.config.studio) { document.getElementById('cfgStudio').value = db.config.studio; document.getElementById('navStudio').textContent = db.config.studio; }
    initRelatorio();
    renderAll();
  };

  function editarAparelhos(aulaId, alunaId) {
    const aula = db.aulas.find(a=>a.id===aulaId);
    if (!aula) return;
    const val = prompt('Aparelhos / Exercícios da aula:', aula.aparelhos||'');
    if (val === null) return;
    aula.aparelhos = val.trim();
    save(); renderAll(); toast('✅ Aparelhos salvos!'); openDetalhe(alunaId);
  }

  /* ---- RELATÓRIO ---- */
  function renderRelatorio() {
    const de  = document.getElementById('relDe')?.value;
    const ate = document.getElementById('relAte')?.value;
    if (!de||!ate) return;
    const filtAluna = document.getElementById('relAluna')?.value || '';

    // update select
    const sel = document.getElementById('relAluna');
    const cur = sel.value;
    sel.innerHTML = '<option value="">Todas</option>' + db.alunas.map(a=>`<option value="${a.id}"${a.id===cur?' selected':''}>${a.nome}</option>`).join('');

    let auls = db.aulas.filter(a=>a.data>=de&&a.data<=ate);
    if (filtAluna) auls = auls.filter(a=>a.alunaId===filtAluna);
    auls.sort((a,b)=>b.data.localeCompare(a.data)||a.alunaId.localeCompare(b.alunaId));

    // group by date
    const byDate = {};
    auls.forEach(a=>{
      if (!byDate[a.data]) byDate[a.data]=[];
      byDate[a.data].push(a);
    });

    const el = document.getElementById('relResult');
    if (!auls.length) { el.innerHTML='<div class="empty"><span class="empty-icon">📋</span>Nenhuma aula no período</div>'; return; }

    el.innerHTML = Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0])).map(([data, aulasData])=>`
      <div class="card" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div class="card-title">📅 ${fmt(data)}</div>
          <span class="badge badge-ok">${aulasData.length} aula${aulasData.length>1?'s':''}</span>
        </div>
        ${aulasData.map(a=>{
          const al = db.alunas.find(x=>x.id===a.alunaId);
          return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-weight:700;font-size:.95rem">👩 ${al?al.nome:'—'}</span>
              <span class="log-type">${a.tipo}</span>
            </div>
            ${a.aparelhos?`<div style="font-size:.8rem;color:var(--text-muted);margin-top:4px">🏋️ ${a.aparelhos}</div>`
              :`<div style="font-size:.78rem;color:#c4b5d4;margin-top:4px;font-style:italic">Sem aparelhos registrados</div>`}
          </div>`;
        }).join('')}
      </div>`).join('');
  }

  function initRelatorio() {
    const now = new Date();
    const y = now.getFullYear(), m = now.getMonth();
    document.getElementById('relDe').value  = new Date(y,m,1).toISOString().slice(0,10);
    document.getElementById('relAte').value = new Date().toISOString().slice(0,10);
    renderRelatorio();
  }

  function renderAll() { renderStats(); renderUltimas(); renderQuickSel(); renderAlunas(); renderPagamento(); renderRelatorio(); }

  function showPage(p) {
    document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
    document.querySelectorAll('.bn-btn').forEach(e=>e.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
    document.getElementById('bn-'+p).classList.add('active');
  }

  /* ---- STATS ---- */
  function renderStats() {
    const today = new Date().toISOString().slice(0,10);
    const mes   = today.slice(0,7);
    const v     = vals();
    const hoje  = db.aulas.filter(a=>a.data===today).length;
    const aMes  = db.aulas.filter(a=>a.data.startsWith(mes)).length;
    const ganho = db.aulas.filter(a=>a.data.startsWith(mes)).reduce((s,a)=>s+(v[a.tipo]||0),0);
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="stat-value">${db.alunas.length}</div><div class="stat-label">Total de Alunas</div></div>
      <div class="stat-card"><div class="stat-value">${hoje}</div><div class="stat-label">Aulas Hoje</div></div>
      <div class="stat-card"><div class="stat-value">${aMes}</div><div class="stat-label">Aulas no Mês</div></div>
      <div class="stat-card"><div class="stat-value">R$ ${ganho}</div><div class="stat-label">Ganho do Mês</div></div>`;
  }

  /* ---- ÚLTIMAS AULAS ---- */
  function renderUltimas() {
    const ul = [...db.aulas].sort((a,b)=>b.data.localeCompare(a.data)).slice(0,10);
    const el = document.getElementById('ultimasAulas');
    if (!ul.length) { el.innerHTML='<div class="empty"><span class="empty-icon">📋</span>Nenhuma aula registrada ainda</div>'; return; }
    el.innerHTML = ul.map(a => {
      const al = db.alunas.find(x=>x.id===a.alunaId);
      return `<div class="log-item" style="flex-direction:column;align-items:flex-start;gap:4px">
        <div style="display:flex;justify-content:space-between;width:100%;align-items:center">
          <div><div class="log-name">${al?al.nome:'—'}</div><div class="log-date">${fmt(a.data)} · <span class="log-type">${a.tipo}</span></div></div>
          <button onclick="excluirAula('${a.id}')" class="btn btn-danger btn-sm">✕</button>
        </div>
        ${a.aparelhos?`<div style="font-size:.77rem;color:var(--text-muted)">🏋️ ${a.aparelhos}</div>`:''}
      </div>`;
    }).join('');
  }

  /* ---- SELECT RÁPIDO ---- */
  function renderQuickSel() {
    const sel = document.getElementById('quickAluna');
    const cur = sel.value;
    sel.innerHTML = '<option value="">Selecione...</option>' + db.alunas.map(a=>`<option value="${a.id}"${a.id===cur?' selected':''}>${a.nome}</option>`).join('');
  }

  /* ---- REGISTRAR AULA ---- */
  function registrarAula() {
    const alunaId   = document.getElementById('quickAluna').value;
    const data      = document.getElementById('quickData').value;
    const tipo      = document.getElementById('quickTipo').value;
    const aparelhos = document.getElementById('quickAparelhos').value.trim();
    if (!alunaId||!data) { toast('⚠️ Selecione a aluna e a data'); return; }
    db.aulas.push({ id:uid(), alunaId, data, tipo, aparelhos });
    document.getElementById('quickAparelhos').value = '';
    save(); renderAll(); toast('✅ Aula registrada!');
  }

  /* ---- LISTA DE ALUNAS ---- */
  function renderAlunas() {
    const q    = (document.getElementById('searchInput')?.value||'').toLowerCase();
    const list = db.alunas.filter(a=>a.nome.toLowerCase().includes(q));
    const el   = document.getElementById('alunasList');
    const mes  = new Date().toISOString().slice(0,7);
    if (!list.length) {
      el.innerHTML=`<div class="empty"><span class="empty-icon">👩</span>${q?'Nenhuma aluna encontrada':'Nenhuma aluna cadastrada<br><small>Toque em + para adicionar</small>'}</div>`;
      return;
    }
    el.innerHTML = list.map(a => {
      const auls    = db.aulas.filter(x=>x.alunaId===a.id);
      const mes_qt  = auls.filter(x=>x.data.startsWith(mes)).length;
      const esp     = a.plano * 4;
      const pct     = Math.min(100, Math.round(mes_qt/esp*100));
      const cls     = pct>=80?'badge-ok':pct>=40?'badge-warn':'badge-danger';
      return `<div class="aluna-item" onclick="openDetalhe('${a.id}')">
        <div class="aluna-header">
          <span class="aluna-name">${a.nome}</span>
          <span class="aluna-plan">${a.plano}x/sem · ${a.tipo}</span>
        </div>
        <div class="aluna-meta">
          <span class="meta-item">Mês: <strong>${mes_qt}/${esp}</strong></span>
          <span class="meta-item">Total: <strong>${auls.length}</strong></span>
          <span class="badge ${cls}">${pct}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
  }

  /* ---- MODAL NOVA/EDITAR ALUNA ---- */
  function openModalAluna(id) {
    editId = id || null;
    if (id) {
      const a = db.alunas.find(x=>x.id===id);
      document.getElementById('aNome').value  = a.nome;
      document.getElementById('aTel').value   = a.tel||'';
      document.getElementById('aPlano').value = a.plano;
      document.getElementById('aTipo').value  = a.tipo;
      document.getElementById('aObs').value   = a.obs||'';
      document.getElementById('modalAlunaTitle').textContent = '✏️ Editar Aluna';
    } else {
      ['aNome','aTel','aObs'].forEach(i=>document.getElementById(i).value='');
      document.getElementById('aPlano').value = '2';
      document.getElementById('aTipo').value  = 'Individual';
      document.getElementById('modalAlunaTitle').textContent = '➕ Nova Aluna';
    }
    document.getElementById('modalAluna').classList.add('open');
  }

  function salvarAluna() {
    const nome = document.getElementById('aNome').value.trim();
    if (!nome) { toast('⚠️ Informe o nome'); return; }
    const data = {
      nome, tel:   document.getElementById('aTel').value,
      plano: +document.getElementById('aPlano').value,
      tipo:  document.getElementById('aTipo').value,
      obs:   document.getElementById('aObs').value,
    };
    if (editId) { Object.assign(db.alunas.find(a=>a.id===editId), data); toast('✅ Aluna atualizada!'); }
    else { db.alunas.push({ id:uid(), ...data }); toast('✅ Aluna cadastrada!'); }
    save(); renderAll(); closeModal('modalAluna');
  }

  /* ---- DETALHE DA ALUNA ---- */
  function openDetalhe(id) {
    const al   = db.alunas.find(a=>a.id===id);
    const auls = db.aulas.filter(a=>a.alunaId===id).sort((a,b)=>b.data.localeCompare(a.data));
    const mes  = new Date().toISOString().slice(0,7);
    const v    = vals();
    const aMes = auls.filter(a=>a.data.startsWith(mes));
    const ganho= aMes.reduce((s,a)=>s+(v[a.tipo]||0),0);
    document.getElementById('detalheContent').innerHTML = `
      <div class="modal-title">${al.nome}</div>
      ${al.tel?`<p style="font-size:.85rem;color:var(--text-muted);margin-bottom:8px">📞 ${al.tel}</p>`:''}
      ${al.obs?`<p style="font-size:.82rem;color:var(--text-muted);margin-bottom:12px">📝 ${al.obs}</p>`:''}
      <div class="stats-grid" style="margin-bottom:12px">
        <div class="stat-card"><div class="stat-value">${aMes.length}</div><div class="stat-label">Aulas este Mês</div></div>
        <div class="stat-card"><div class="stat-value">R$ ${ganho}</div><div class="stat-label">Valor Mês</div></div>
        <div class="stat-card"><div class="stat-value">${auls.length}</div><div class="stat-label">Total de Aulas</div></div>
        <div class="stat-card"><div class="stat-value">${al.plano}x/sem</div><div class="stat-label">Plano</div></div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <button class="btn btn-ghost btn-sm" onclick="closeModal('modalDetalhe');openModalAluna('${id}')">✏️ Editar</button>
        <button class="btn btn-primary btn-sm" onclick="addAulaManual('${id}')">➕ Aula</button>
      </div>
      <div class="card-title" style="margin-bottom:8px;font-size:.88rem">Histórico</div>
      ${auls.slice(0,40).map(a=>`
        <div class="log-item" style="flex-direction:column;align-items:flex-start;gap:6px">
          <div style="display:flex;justify-content:space-between;width:100%;align-items:center">
            <div><span class="log-name">${fmt(a.data)}</span> · <span class="log-type">${a.tipo}</span></div>
            <div style="display:flex;gap:4px">
              <button onclick="editarAparelhos('${a.id}','${id}')" class="btn btn-ghost btn-sm">🏋️</button>
              <button onclick="excluirAula('${a.id}','${id}')" class="btn btn-danger btn-sm">✕</button>
            </div>
          </div>
          ${a.aparelhos?`<div style="font-size:.78rem;color:var(--text-muted);padding-left:2px">🏋️ ${a.aparelhos}</div>`:''}
        </div>`).join('')||'<div style="color:var(--text-muted);font-size:.85rem;padding:8px 0">Nenhuma aula registrada</div>'}
    `;
    document.getElementById('btnExcluir').onclick = ()=>excluirAluna(id);
    document.getElementById('modalDetalhe').classList.add('open');
  }

  function addAulaManual(alunaId) {
    const al   = db.alunas.find(a=>a.id===alunaId);
    const data = prompt('Data da aula (AAAA-MM-DD):', new Date().toISOString().slice(0,10));
    if (!data) return;
    const aparelhos = prompt('Aparelhos / Exercícios (opcional):', '') || '';
    db.aulas.push({ id:uid(), alunaId, data, tipo:al.tipo, aparelhos });
    save(); renderAll(); toast('✅ Aula registrada!'); openDetalhe(alunaId);
  }

  function excluirAluna(id) {
    if (!confirm('Excluir esta aluna e todo o histórico dela?')) return;
    db.alunas = db.alunas.filter(a=>a.id!==id);
    db.aulas  = db.aulas.filter(a=>a.alunaId!==id);
    save(); renderAll(); closeModal('modalDetalhe'); toast('🗑️ Aluna removida');
  }

  function excluirAula(id, alunaId) {
    db.aulas = db.aulas.filter(a=>a.id!==id);
    save(); renderAll(); toast('🗑️ Aula removida');
    if (alunaId) openDetalhe(alunaId);
  }

  /* ---- PAGAMENTO ---- */
  function renderPagamento() {
    const de  = document.getElementById('payDe')?.value;
    const ate = document.getElementById('payAte')?.value;
    if (!de||!ate) return;
    const v    = vals();
    const auls = db.aulas.filter(a=>a.data>=de&&a.data<=ate);
    const res  = {Individual:0,Dupla:0,Trio:0,Grupo:0};
    auls.forEach(a=>{if(res[a.tipo]!==undefined)res[a.tipo]++;});
    const total = Object.entries(res).reduce((s,[t,q])=>s+q*(v[t]||0),0);
    const porAluna = {};
    auls.forEach(a=>{
      if(!porAluna[a.alunaId])porAluna[a.alunaId]={qt:0,val:0};
      porAluna[a.alunaId].qt++; porAluna[a.alunaId].val+=v[a.tipo]||0;
    });
    document.getElementById('payResult').innerHTML = `
      <div class="card">
        <div class="card-title" style="margin-bottom:12px">📊 Resumo do Período</div>
        ${Object.entries(res).filter(([,v])=>v>0).map(([t,q])=>`
          <div class="pay-row"><span>${t}</span><span>${q} aulas · R$ ${(q*(v[t]||0)).toFixed(2)}</span></div>`).join('')}
        <div class="pay-row" style="border-top:2px solid var(--border);margin-top:8px;padding-top:12px">
          <strong>TOTAL (${auls.length} aulas)</strong>
          <span class="pay-total">R$ ${total.toFixed(2)}</span>
        </div>
        <div style="font-size:.78rem;color:var(--text-muted);margin-top:6px">${fmt(de)} até ${fmt(ate)}</div>
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:12px">👩 Detalhamento por Aluna</div>
        ${Object.keys(porAluna).length
          ? Object.entries(porAluna).sort((a,b)=>b[1].val-a[1].val).map(([aid,d])=>{
              const al = db.alunas.find(a=>a.id===aid);
              return `<div class="pay-row"><span>${al?al.nome:'—'}</span><span>${d.qt} aulas · <strong>R$ ${d.val.toFixed(2)}</strong></span></div>`;
            }).join('')
          : '<div class="empty">Nenhuma aula no período selecionado</div>'
        }
      </div>`;
  }

  /* ---- CONFIG ---- */
  function salvarConfig() {
    db.config.nome   = document.getElementById('cfgNome').value;
    db.config.studio = document.getElementById('cfgStudio').value;
    document.getElementById('navStudio').textContent = db.config.studio;
    save();
  }

  function exportar() {
    const blob = new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'pilates_backup_'+new Date().toISOString().slice(0,10)+'.json';
    a.click(); toast('📤 Backup exportado!');
  }

  function importar(input) {
    const file = input.files[0]; if(!file)return;
    const r = new FileReader();
    r.onload = e => {
      try {
        db = JSON.parse(e.target.result); save(); renderAll();
        if(db.config.nome)   document.getElementById('cfgNome').value   = db.config.nome;
        if(db.config.studio) document.getElementById('cfgStudio').value = db.config.studio;
        toast('✅ Dados importados com sucesso!');
      } catch { toast('❌ Arquivo inválido'); }
    };
    r.readAsText(file);
  }

  function limpar() {
    if(!confirm('Apagar TODOS os dados? Esta ação não pode ser desfeita.'))return;
    db={alunas:[],aulas:[],config:{}}; save(); renderAll(); toast('🗑️ Dados apagados');
  }

  /* ---- EXPORTAR PDF ---- */
  function exportarPDF() {
    const de  = document.getElementById('relDe')?.value;
    const ate = document.getElementById('relAte')?.value;
    if (!de||!ate) { toast('⚠️ Selecione o período'); return; }
    const filtAluna = document.getElementById('relAluna')?.value || '';
    let auls = db.aulas.filter(a=>a.data>=de&&a.data<=ate);
    if (filtAluna) auls = auls.filter(a=>a.alunaId===filtAluna);
    auls.sort((a,b)=>b.data.localeCompare(a.data));

    const byDate = {};
    auls.forEach(a=>{ if(!byDate[a.data])byDate[a.data]=[]; byDate[a.data].push(a); });

    const studio = db.config.studio || 'Pilates Control';
    const prof   = db.config.nome   || '';
    const today  = new Date().toLocaleDateString('pt-BR');

    const linhasPorData = Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0])).map(([data, aulasData])=>{
      const rows = aulasData.map(a=>{
        const al = db.alunas.find(x=>x.id===a.alunaId);
        return `<tr>
          <td></td>
          <td>${al?al.nome:'—'}</td>
          <td>${a.tipo}</td>
          <td>${a.aparelhos||'<span style="color:#aaa;font-style:italic">—</span>'}</td>
        </tr>`;
      }).join('');
      return `<tr class="date-row">
        <td colspan="4">📅 ${fmt(data)} <span style="font-size:11px;font-weight:400;color:#555">(${aulasData.length} aula${aulasData.length>1?'s':''})</span></td>
      </tr>${rows}`;
    }).join('');

    const html = `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
    <title>Relatório – ${studio}</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
      * { box-sizing:border-box; margin:0; padding:0; }
      body { font-family: 'Inter', sans-serif; color: #1e1b2e; background:#fff; padding:32px; }
      .header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px; border-bottom:3px solid #a855f7; padding-bottom:18px; }
      .studio-name { font-size:22px; font-weight:800; color:#7e22ce; }
      .prof { font-size:13px; color:#6b7280; margin-top:4px; }
      .periodo { text-align:right; font-size:12px; color:#6b7280; line-height:1.8; }
      .periodo strong { color:#a855f7; font-size:14px; display:block; }
      h2 { font-size:15px; font-weight:700; color:#7e22ce; margin-bottom:16px; }
      table { width:100%; border-collapse:collapse; font-size:13px; }
      th { background:#f3e8ff; color:#7e22ce; font-weight:700; padding:9px 12px; text-align:left; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
      td { padding:8px 12px; border-bottom:1px solid #f0e6ff; vertical-align:middle; }
      tr.date-row td { background:#7e22ce; color:#fff; font-weight:700; font-size:13px; padding:8px 12px; }
      tr:hover td { background:#faf5ff; }
      tr.date-row:hover td { background:#7e22ce; }
      .summary { margin-top:28px; display:flex; gap:16px; }
      .sum-card { flex:1; border:1.5px solid #e9d5ff; border-radius:12px; padding:14px; text-align:center; }
      .sum-val { font-size:26px; font-weight:800; color:#a855f7; }
      .sum-lbl { font-size:11px; color:#6b7280; font-weight:600; margin-top:3px; }
      .footer { margin-top:28px; text-align:center; font-size:11px; color:#aaa; }
      @media print { body { padding:16px; } }
    </style></head><body>
    <div class="header">
      <div>
        <div class="studio-name">🧘 ${studio}</div>
        ${prof?`<div class="prof">Professora: ${prof}</div>`:''}
      </div>
      <div class="periodo">
        <strong>Relatório de Aulas</strong>
        ${fmt(de)} até ${fmt(ate)}<br>
        Gerado em ${today}
      </div>
    </div>
    <div class="summary">
      <div class="sum-card"><div class="sum-val">${auls.length}</div><div class="sum-lbl">Total de Aulas</div></div>
      <div class="sum-card"><div class="sum-val">${Object.keys(byDate).length}</div><div class="sum-lbl">Dias com Aula</div></div>
      <div class="sum-card"><div class="sum-val">${[...new Set(auls.map(a=>a.alunaId))].length}</div><div class="sum-lbl">Pacientes</div></div>
    </div>
    <br>
    <table>
      <thead><tr><th style="width:120px">Data</th><th>Paciente</th><th style="width:100px">Tipo</th><th>Aparelhos</th></tr></thead>
      <tbody>${linhasPorData||'<tr><td colspan="4" style="text-align:center;padding:24px;color:#aaa">Nenhuma aula no período</td></tr>'}</tbody>
    </table>
    <div class="footer">Pilates Control · Relatório gerado automaticamente</div>
    <script>window.onload=()=>{ window.print(); }<\/script>
    </body></html>`;

    const win = window.open('','_blank');
    if (!win) { toast('⚠️ Permita pop-ups para exportar o PDF'); return; }
    win.document.write(html);
    win.document.close();
    toast('📄 Abrindo relatório para impressão...');
  }

  /* ---- HELPERS ---- */
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent=msg; el.style.opacity='1'; el.style.transform='translateX(-50%) translateY(0)';
    setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(-50%) translateY(30px)'; },2500);
  }
</script>
</body>
</html>
